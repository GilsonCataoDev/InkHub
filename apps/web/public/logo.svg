<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" fill="none">
  <!-- ── Icon (scaled to ~110px tall) ── -->
  <g transform="translate(5, 5) scale(0.495)">
    <!-- Teardrop outline -->
    <path d="M100 12 C95 25, 48 75, 40 130 C34 175, 62 222, 100 222 C138 222, 166 175, 160 130 C152 75, 105 25, 100 12 Z"
          fill="none" stroke="#f59e0b" stroke-width="9" stroke-linejoin="round"/>
    <!-- Needle body -->
    <rect x="85" y="30" width="30" height="55" rx="5" fill="#f59e0b"/>
    <!-- Needle tip -->
    <polygon points="85,85 115,85 100,118" fill="#f59e0b"/>
    <!-- Grip bands -->
    <rect x="78" y="50" width="7" height="6" rx="2" fill="#f59e0b"/>
    <rect x="78" y="62" width="7" height="6" rx="2" fill="#f59e0b"/>
    <!-- Hub center -->
    <circle cx="100" cy="155" r="11" fill="#f59e0b"/>
    <!-- Hub lines -->
    <line x1="100" y1="144" x2="100" y2="125" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
    <line x1="91"  y1="163" x2="72"  y2="178" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
    <line x1="109" y1="163" x2="128" y2="178" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
    <line x1="100" y1="166" x2="100" y2="186" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
    <!-- Hub outer nodes -->
    <circle cx="62"  cy="185" r="9" fill="none" stroke="#f59e0b" stroke-width="5"/>
    <circle cx="138" cy="185" r="9" fill="none" stroke="#f59e0b" stroke-width="5"/>
    <circle cx="100" cy="198" r="9" fill="none" stroke="#f59e0b" stroke-width="5"/>
  </g>

  <!-- ── Wordmark ── -->
  <text x="118" y="90"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-weight="900"
        font-size="72"
        fill="#ffffff"
        letter-spacing="-1">Ink</text>
  <text x="276" y="90"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-weight="900"
        font-size="72"
        fill="#f59e0b"
        letter-spacing="-1">Hub</text>
</svg>
