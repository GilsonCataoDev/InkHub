version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: inkhub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: inkhub
      POSTGRES_PASSWORD: inkhub_secret
      POSTGRES_DB: inkhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inkhub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: inkhub_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: inkhub_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://inkhub:inkhub_secret@postgres:5432/inkhub?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: inkhub_web
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  uploads_data:
